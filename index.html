<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Contact</title>

<!-- ══════════════════════════════════════════════════════════════════════
     PCRI-style contact page.  Recreates the qrco.de vCard layout, self-hosted.
     👉  You only ever edit the CARD block in the <script> at the BOTTOM.
        Everything on the page is driven from it: name, colors, logo,
        phones, email, address, website, socials — all editable there.
════════════════════════════════════════════════════════════════════════ -->

<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; }
  body {
    font: 16px/1.45 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: #e6e6ea;
    color: #202124;
  }
  .wrap { max-width: 480px; margin: 0 auto; background: #f4f4f5; min-height: 100vh; }

  /* ---------- header ---------- */
  .header { background: var(--brand); padding: 34px 20px 0; text-align: center; }
  .logo {
    width: 112px; height: 112px; border-radius: 50%;
    margin: 0 auto; background: #fff center/cover no-repeat;
    display: grid; place-items: center;
    color: var(--brand); font-size: 34px; font-weight: 800; letter-spacing: 1px;
    box-shadow: 0 6px 18px rgba(0,0,0,.18);
    overflow: hidden;
  }
  .logo img { width: 100%; height: 100%; object-fit: contain; padding: 14px; }
  .org { color: #fff; font-size: 24px; font-weight: 600; margin: 18px 0 22px; }

  /* ---------- CALL / EMAIL / DIRECTIONS bar ---------- */
  .actions { display: flex; border-top: 1px solid rgba(255,255,255,.22); }
  .actions a {
    flex: 1; text-decoration: none; color: #fff;
    padding: 14px 6px 16px; text-align: center;
    display: grid; gap: 7px; justify-items: center;
    font-size: 12px; font-weight: 600; letter-spacing: .3px;
  }
  .actions a + a { border-left: 1px solid rgba(255,255,255,.22); }
  .actions svg { width: 22px; height: 22px; }
  .actions a:active { background: rgba(0,0,0,.08); }

  /* ---------- info rows ---------- */
  .body { padding: 26px 20px 34px; }
  .row { display: flex; gap: 18px; padding: 14px 0; }
  .row .ic { width: 24px; flex: 0 0 24px; color: #9aa0a6; padding-top: 2px; }
  .row .ic svg { width: 24px; height: 24px; }
  .row .val a, .row .val span { color: #202124; text-decoration: none; }
  .row .val .lbl { color: #80868b; font-size: 13px; margin-top: 2px; }
  .row .val .sub { margin-top: 4px; }               /* extra phone / address lines */
  .row .val .map { display: inline-block; margin-top: 12px; font-weight: 700; color: #202124; text-decoration: none; letter-spacing: .3px; }
  .sep { height: 1px; background: #e0e0e3; margin: 4px 0 4px 42px; }

  /* ---------- social ---------- */
  .social-h { color: #80868b; font-size: 15px; margin: 24px 0 16px; }
  .socials { display: flex; gap: 16px; flex-wrap: wrap; }
  .socials a {
    width: 46px; height: 46px; border-radius: 50%;
    display: grid; place-items: center; overflow: hidden;
    box-shadow: 0 1px 3px rgba(0,0,0,.15);
  }
  .socials a svg { width: 24px; height: 24px; }

  /* ---------- big buttons ---------- */
  .btns { padding: 20px 20px 40px; display: grid; gap: 18px; }
  .btn {
    display: flex; align-items: center; justify-content: center; gap: 12px;
    background: #fff; border: 0; border-radius: 6px; cursor: pointer;
    padding: 20px; font: inherit; font-weight: 700; letter-spacing: .4px; color: #202124;
    box-shadow: 0 10px 24px rgba(0,0,0,.10);
    text-decoration: none;
  }
  .btn svg { width: 22px; height: 22px; }
  .btn:active { transform: translateY(1px); }
</style>

<div class="wrap">
  <div class="header">
    <div class="logo" id="logo"></div>
    <div class="org" id="org"></div>
    <div class="actions" id="actions"></div>
  </div>
  <div class="body" id="rows"></div>
  <div class="btns">
    <button class="btn" id="vcard">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><line x1="19" y1="8" x2="19" y2="14"/><line x1="22" y1="11" x2="16" y2="11"/></svg>
      DOWNLOAD VCARD
    </button>
    <button class="btn" id="share">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.6" y1="13.5" x2="15.4" y2="17.5"/><line x1="15.4" y1="6.5" x2="8.6" y2="10.5"/></svg>
      SHARE THIS PAGE
    </button>
  </div>
</div>

<script>
/* ══════════════════════════════════════════════════════════════════════
   ✏️   EDIT EVERYTHING HERE — this whole block is yours.
        Delete a field or set it to "" to hide it. Add/remove phones and
        socials by editing the arrays.  Save the file → the page updates.
══════════════════════════════════════════════════════════════════════ */
const CARD = {
  org:   "Pain Center of Rhode Island",
  brand: "#3b40a0",                 // header + icon color. Any hex you like.
  logo:  "",                        // image URL (or a file next to this page, e.g. "logo.png"). "" = show initials.

  phones: [
    { number: "+1 4016486100", label: "Mobile" },
    { number: "+1 4013723471", label: "Fax" },
  ],
  email:   "info@paincenterofri.com",
  website: "paincenterofri.com",    // shown without http://, links correctly
  address: {
    lines: ["Reservoir Avenue 1150", "Cranston, RI 02920", "United States"],
    maps:  "Reservoir Avenue 1150, Cranston, RI 02920",   // used for the map link
  },

  socials: [
    { type: "instagram", url: "https://instagram.com/" },
    { type: "facebook",  url: "https://facebook.com/" },
    { type: "google",    url: "https://google.com/" },
    // supported types: instagram, facebook, google, twitter, linkedin,
    // youtube, tiktok, whatsapp, website. Unknown types get a generic dot.
  ],
};
/* ══════════════════════════════════════════════════════════════════════ */

const $ = id => document.getElementById(id);
document.documentElement.style.setProperty("--brand", CARD.brand);
document.title = CARD.org;
const tel = n => "tel:" + n.replace(/[^+\d]/g, "");

// ---- header ----
const logo = $("logo");
if (CARD.logo) logo.innerHTML = `<img src="${CARD.logo}" alt="">`;
else logo.textContent = CARD.org.split(/\s+/).map(w => w[0]).join("").slice(0, 3).toUpperCase();
$("org").textContent = CARD.org;

// ---- CALL / EMAIL / DIRECTIONS ----
const ICON = {
  phone: '<path d="M22 16.9v3a2 2 0 0 1-2.2 2 19.8 19.8 0 0 1-8.6-3.1 19.5 19.5 0 0 1-6-6A19.8 19.8 0 0 1 2.1 4.2 2 2 0 0 1 4.1 2h3a2 2 0 0 1 2 1.7c.1.9.4 1.9.7 2.8a2 2 0 0 1-.5 2.1L8.1 9.9a16 16 0 0 0 6 6l1.3-1.3a2 2 0 0 1 2.1-.5c.9.3 1.9.6 2.8.7a2 2 0 0 1 1.7 2Z"/>',
  send:  '<line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>',
  pin:   '<path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0Z"/><circle cx="12" cy="10" r="3"/>',
  mail:  '<rect x="2" y="4" width="20" height="16" rx="2"/><polyline points="22,6 12,13 2,6"/>',
  globe: '<circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15 15 0 0 1 4 10 15 15 0 0 1-4 10 15 15 0 0 1-4-10 15 15 0 0 1 4-10Z"/>',
};
const svg = (p, stroke = "currentColor") =>
  `<svg viewBox="0 0 24 24" fill="none" stroke="${stroke}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">${p}</svg>`;

const acts = [];
if (CARD.phones[0]) acts.push([svg(ICON.phone), "CALL", tel(CARD.phones[0].number)]);
if (CARD.email)    acts.push([svg(ICON.send), "EMAIL", "mailto:" + CARD.email]);
if (CARD.address)  acts.push([svg(ICON.pin), "DIRECTIONS", "https://maps.google.com/?q=" + encodeURIComponent(CARD.address.maps)]);
$("actions").innerHTML = acts.map(([ic, lbl, href]) =>
  `<a href="${href}" ${href.startsWith("http") ? 'target="_blank" rel="noopener"' : ""}>${ic}<span>${lbl}</span></a>`).join("");

// ---- info rows ----
function row(icon, valHtml) {
  return `<div class="row"><span class="ic">${svg(icon)}</span><div class="val">${valHtml}</div></div>`;
}
const parts = [];

// phones (first icon shown once, extra numbers stacked under it like the original)
if (CARD.phones.length) {
  const inner = CARD.phones.map((p, i) =>
    `<div class="${i ? "sub" : ""}"><a href="${tel(p.number)}">${p.number}</a><div class="lbl">${p.label || ""}</div></div>`
  ).join("");
  parts.push(row(ICON.phone, inner));
}
if (CARD.email)
  parts.push(row(ICON.mail, `<a href="mailto:${CARD.email}">${CARD.email}</a><div class="lbl">Email</div>`));
if (CARD.address) {
  const lines = CARD.address.lines.map(l => `<span>${l}</span>`).join("<br>");
  const maps = "https://maps.google.com/?q=" + encodeURIComponent(CARD.address.maps);
  parts.push(row(ICON.pin, `${lines}<br><a class="map" href="${maps}" target="_blank" rel="noopener">SHOW ON MAP</a>`));
}
if (CARD.website) {
  const href = /^https?:/.test(CARD.website) ? CARD.website : "https://" + CARD.website;
  const shown = CARD.website.replace(/^https?:\/\//, "");
  parts.push(row(ICON.globe, `<a href="${href}" target="_blank" rel="noopener">${shown}</a><div class="lbl">Website</div>`));
}
$("rows").innerHTML = parts.join('<div class="sep"></div>') + socialBlock();

// ---- socials ----
function socialBlock() {
  if (!CARD.socials || !CARD.socials.length) return "";
  const BRANDS = {
    instagram: { bg: "linear-gradient(45deg,#feda75,#fa7e1e,#d62976,#962fbf,#4f5bd5)",
      svg: '<svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2"><rect x="2.5" y="2.5" width="19" height="19" rx="5.5"/><circle cx="12" cy="12" r="4.2"/><circle cx="17.6" cy="6.4" r="1.2" fill="#fff" stroke="none"/></svg>' },
    facebook:  { bg: "#1877f2",
      svg: '<svg viewBox="0 0 24 24" fill="#fff"><path d="M13.5 21v-8h2.7l.4-3.1h-3.1V7.9c0-.9.25-1.5 1.55-1.5H17V3.6c-.29-.04-1.27-.13-2.41-.13-2.39 0-4.02 1.46-4.02 4.13V9.9H7.9V13h2.67v8h2.93z"/></svg>' },
    google:    { bg: "#fff",
      svg: '<svg viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.5 0 6.7 1.2 9.2 3.6l6.9-6.9C35.9 2.4 30.5 0 24 0 14.6 0 6.5 5.4 2.6 13.2l8 6.2C12.4 13.7 17.7 9.5 24 9.5z"/><path fill="#4285F4" d="M47 24.5c0-1.6-.2-3.1-.4-4.5H24v9h13c-.6 3-2.3 5.5-4.8 7.2l7.7 6c4.5-4.2 7.1-10.4 7.1-17.7z"/><path fill="#FBBC05" d="M10.6 28.6c-.5-1.5-.8-3-.8-4.6s.3-3.1.8-4.6l-8-6.2C.9 16.5 0 20.1 0 24s.9 7.5 2.6 10.8l8-6.2z"/><path fill="#34A853" d="M24 48c6.5 0 11.9-2.1 15.9-5.8l-7.7-6c-2.2 1.4-4.9 2.3-8.2 2.3-6.3 0-11.6-4.2-13.5-9.9l-8 6.2C6.5 42.6 14.6 48 24 48z"/></svg>' },
    twitter:   { bg: "#000",     svg: '<svg viewBox="0 0 24 24" fill="#fff"><path d="M18.9 2H22l-7 8 8.2 12h-6.4l-5-6.6L9 22H2l7.5-8.6L1.6 2H8l4.6 6.1L18.9 2zm-1.1 18h1.8L7 4H5.1l12.7 16z"/></svg>' },
    linkedin:  { bg: "#0a66c2",  svg: '<svg viewBox="0 0 24 24" fill="#fff"><path d="M4.98 3.5A2.5 2.5 0 1 1 5 8.5a2.5 2.5 0 0 1 0-5zM3 9h4v12H3zM9 9h3.8v1.6h.05c.53-.95 1.83-1.95 3.75-1.95 4 0 4.4 2.6 4.4 6V21H21v-5.4c0-1.3 0-3-1.8-3s-2.1 1.4-2.1 2.9V21H13z"/></svg>' },
    youtube:   { bg: "#ff0000",  svg: '<svg viewBox="0 0 24 24" fill="#fff"><path d="M23 12s0-3-.4-4.4c-.2-.8-.9-1.4-1.7-1.6C19.5 5.5 12 5.5 12 5.5s-7.5 0-8.9.5c-.8.2-1.5.8-1.7 1.6C1 9 1 12 1 12s0 3 .4 4.4c.2.8.9 1.4 1.7 1.6 1.4.5 8.9.5 8.9.5s7.5 0 8.9-.5c.8-.2 1.5-.8 1.7-1.6C23 15 23 12 23 12zm-13 3V9l5 3z"/></svg>' },
    tiktok:    { bg: "#000",     svg: '<svg viewBox="0 0 24 24" fill="#fff"><path d="M16 3c.3 2.3 1.6 3.7 3.8 3.8v2.6c-1.3.1-2.5-.3-3.8-1v5.7c0 4-3 6.3-6.4 5.5-3-.7-4-3.3-3.3-5.7.6-2 2.4-3.2 4.6-3v2.7c-.4-.1-.8-.2-1.2-.1-1 .1-1.7 1-1.6 2 .1 1 .9 1.7 2 1.6 1.1-.1 1.7-1 1.7-2.2V3H16z"/></svg>' },
    whatsapp:  { bg: "#25d366",  svg: '<svg viewBox="0 0 24 24" fill="#fff"><path d="M12 2a10 10 0 0 0-8.5 15.2L2 22l4.9-1.5A10 10 0 1 0 12 2zm5.3 14c-.2.6-1.2 1.2-1.7 1.2-.5.1-1 .2-3.2-.7-2.7-1.1-4.4-3.9-4.5-4-.1-.2-1-1.4-1-2.6s.6-1.8.9-2.1c.2-.2.5-.3.7-.3h.5c.2 0 .4 0 .6.5l.8 1.9c.1.2.1.4 0 .5l-.4.6c-.2.2-.3.4-.1.7.2.3.9 1.4 1.9 2.2 1.3 1.1 2.3 1.5 2.6 1.6.2.1.4.1.6-.1l.8-1c.2-.2.3-.2.6-.1l1.9.9c.3.1.4.2.5.3.1.3.1.7-.1 1.1z"/></svg>' },
    website:   { bg: "#5f6368",  svg: svg(ICON.globe, "#fff") },
  };
  const items = CARD.socials.filter(s => s && s.url).map(s => {
    const b = BRANDS[s.type] || { bg: "#5f6368", svg: svg(ICON.globe, "#fff") };
    return `<a href="${s.url}" target="_blank" rel="noopener" style="background:${b.bg}">${b.svg}</a>`;
  }).join("");
  return `<div class="social-h">Social Media</div><div class="socials">${items}</div>`;
}

// ---- DOWNLOAD VCARD → saves to iPhone / Android contacts ----
function buildVCard() {
  const typeMap = { Mobile: "CELL", Cell: "CELL", Fax: "FAX", Work: "WORK", Home: "HOME", Office: "WORK" };
  const L = ["BEGIN:VCARD", "VERSION:3.0", `FN:${CARD.org}`, `ORG:${CARD.org}`];
  (CARD.phones || []).forEach(p =>
    L.push(`TEL;TYPE=${typeMap[p.label] || "VOICE"}:${p.number.replace(/\s+/g, "")}`));
  if (CARD.email)   L.push(`EMAIL;TYPE=INTERNET:${CARD.email}`);
  if (CARD.website) L.push(`URL:${/^https?:/.test(CARD.website) ? CARD.website : "https://" + CARD.website}`);
  if (CARD.address) L.push(`ADR;TYPE=WORK:;;${CARD.address.lines.join(", ")};;;;`);
  (CARD.socials || []).forEach(s => s.url && L.push(`URL:${s.url}`));
  L.push("END:VCARD");
  return L.join("\r\n");
}
$("vcard").addEventListener("click", () => {
  const blob = new Blob([buildVCard()], { type: "text/vcard;charset=utf-8" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = CARD.org.replace(/\s+/g, "_") + ".vcf";
  document.body.appendChild(a);
  a.click();
  a.remove();
  setTimeout(() => URL.revokeObjectURL(url), 1500);
});

// ---- SHARE THIS PAGE ----
$("share").addEventListener("click", async () => {
  const data = { title: CARD.org, url: location.href };
  if (navigator.share) { try { await navigator.share(data); } catch (e) {} }
  else {
    try { await navigator.clipboard.writeText(location.href); alert("Link copied!"); }
    catch (e) { prompt("Copy this link:", location.href); }
  }
});
</script>
