function buildVCard() {
  const tm = { Mobile:"CELL", Cell:"CELL", Fax:"FAX", Work:"WORK", Home:"HOME", Office:"WORK" };
  const L = ["BEGIN:VCARD","VERSION:3.0","FN:" + CARD.org, "ORG:" + CARD.org];
  (CARD.phones||[]).forEach(p => L.push("TEL;TYPE=" + (tm[p.label]||"VOICE") + ":" + p.number.replace(/\s+/g,"")));
  if (CARD.email) L.push("EMAIL;TYPE=INTERNET:" + CARD.email);
  if (CARD.website) L.push("URL:" + (/^https?:/.test(CARD.website) ? CARD.website : "https://" + CARD.website));
  if (CARD.address) L.push("ADR;TYPE=WORK:;;" + CARD.address.lines.join(", ") + ";;;;");
  (CARD.socials||[]).forEach(s => s.url && L.push("URL:" + s.url));
  L.push("END:VCARD");
  return L.join("\r\n");
}
$("vcard").addEventListener("click", () => {
  const blob = new Blob([buildVCard()], { type: "text/vcard;charset=utf-8" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = (CARD.org||"contact").replace(/\s+/g,"_") + ".vcf";
  document.body.appendChild(a); a.click(); a.remove();
  setTimeout(() => URL.revokeObjectURL(url), 1500);
});
$("share").addEventListener("click", async () => {
  const data = { title: CARD.org, url: location.href };
  if (navigator.share) { try { await navigator.share(data); } catch(e){} }
  else { try { await navigator.clipboard.writeText(location.href); alert("Link copied!"); } catch(e){ prompt("Copy this link:", location.href); } }
});

// loading screen fade-out
(function(){
  var sp = document.getElementById("splash");
  if (!sp) return;
  var inIframe; try { inIframe = window.self !== window.top; } catch(e){ inIframe = true; }
  if (inIframe) { if (sp.parentNode) sp.parentNode.removeChild(sp); return; }
  var MIN = 1000, t0 = (window.performance && performance.now) ? performance.now() : 0;
  function hide(){ sp.style.opacity = "0"; setTimeout(function(){ if (sp.parentNode) sp.parentNode.removeChild(sp); }, 550); }
  function go(){ var e = ((window.performance && performance.now) ? performance.now() : 0) - t0; setTimeout(hide, Math.max(0, MIN - e)); }
  if (document.readyState === "complete") go(); else window.addEventListener("load", go);
})();
