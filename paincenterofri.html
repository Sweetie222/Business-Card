  body { font: 16px/1.45 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background: #e6e6ea; color: #202124; }
  .wrap { max-width: 480px; margin: 0 auto; background: #f4f4f5; min-height: 100vh; }
  .header { background: var(--brand); padding: 34px 20px 0; text-align: center; }
  .logo { width: 112px; height: 112px; border-radius: 50%; margin: 0 auto; background: #fff center/cover no-repeat; display: grid; place-items: center; color: var(--brand); font-size: 34px; font-weight: 800; letter-spacing: 1px; box-shadow: 0 6px 18px rgba(0,0,0,.18); overflow: hidden; }
  .logo img { width: 100%; height: 100%; object-fit: contain; padding: 14px; }
  .org { color: #fff; font-size: 24px; font-weight: 600; margin: 18px 0 22px; }
  .actions { display: flex; border-top: 1px solid rgba(255,255,255,.22); }
  .actions a { flex: 1; text-decoration: none; color: #fff; padding: 14px 6px 16px; text-align: center; display: grid; gap: 7px; justify-items: center; font-size: 12px; font-weight: 600; letter-spacing: .3px; }
  .actions a + a { border-left: 1px solid rgba(255,255,255,.22); }
  .actions svg { width: 22px; height: 22px; }
  .actions a:active { background: rgba(0,0,0,.08); }
  .body { padding: 26px 20px 34px; }
  .row { display: flex; gap: 18px; padding: 14px 0; }
  .row .ic { width: 24px; flex: 0 0 24px; color: #9aa0a6; padding-top: 2px; }
  .row .ic svg { width: 24px; height: 24px; }
  .row .val a, .row .val span { color: #202124; text-decoration: none; }
  .row .val .lbl { color: #80868b; font-size: 13px; margin-top: 2px; }
  .row .val .sub { margin-top: 4px; }
  .row .val .map { display: inline-block; margin-top: 12px; font-weight: 700; color: #202124; text-decoration: none; letter-spacing: .3px; }
  .sep { height: 1px; background: #e0e0e3; margin: 4px 0 4px 42px; }
  .social-h { color: #80868b; font-size: 15px; margin: 24px 0 16px; }
  .socials { display: flex; gap: 16px; flex-wrap: wrap; }
  .socials a { width: 46px; height: 46px; border-radius: 50%; display: grid; place-items: center; overflow: hidden; box-shadow: 0 1px 3px rgba(0,0,0,.15); }
  .socials a svg { width: 24px; height: 24px; }
  .btns { padding: 20px 20px 40px; display: grid; gap: 18px; }
  .btn { display: flex; align-items: center; justify-content: center; gap: 12px; background: #fff; border: 0; border-radius: 6px; cursor: pointer; padding: 20px; font: inherit; font-weight: 700; letter-spacing: .4px; color: #202124; box-shadow: 0 10px 24px rgba(0,0,0,.10); text-decoration: none; }
  .btn svg { width: 22px; height: 22px; }
  .btn:active { transform: translateY(1px); }
</style>

$("rows").innerHTML = parts.join('<div class="sep"></div>') + socialBlock();
function buildVCard() {
  const tm = { Mobile:"CELL", Cell:"CELL", Fax:"FAX", Work:"WORK", Home:"HOME", Office:"WORK" };
  const L = ["BEGIN:VCARD","VERSION:3.0","FN:" + CARD.org, "ORG:" + CARD.org];
  (CARD.phones||[]).forEach(p => L.push("TEL;TYPE=" + (tm[p.label]||"VOICE") + ":" + p.number.replace(/\s+/g,"")));
  if (CARD.email) L.push("EMAIL;TYPE=INTERNET:" + CARD.email);
  if (CARD.website) L.push("URL:" + (/^https?:/.test(CARD.website) ? CARD.website : "https://" + CARD.website));
  if (CARD.address) L.push("ADR;TYPE=WORK:;;" + CARD.address.lines.join(", ") + ";;;;");
  (CARD.socials||[]).forEach(s => s.url && L.push("URL:" + s.url));
  L.push("END:VCARD");
  return L.join("\r\n");
}
$("vcard").addEventListener("click", () => {
  const blob = new Blob([buildVCard()], { type: "text/vcard;charset=utf-8" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = (CARD.org||"contact").replace(/\s+/g,"_") + ".vcf";
  document.body.appendChild(a); a.click(); a.remove();
  setTimeout(() => URL.revokeObjectURL(url), 1500);
});
$("share").addEventListener("click", async () => {
  const data = { title: CARD.org, url: location.href };
  if (navigator.share) { try { await navigator.share(data); } catch(e){} }
  else { try { await navigator.clipboard.writeText(location.href); alert("Link copied!"); } catch(e){ prompt("Copy this link:", location.href); } }
});
